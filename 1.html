<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Mobility Presentation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: "Inter", sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }

        .slide-container { position: relative; width: 100%; height: 100%; max-width: 1280px; max-height: 720px; overflow: hidden; background: radial-gradient(ellipse at center, #0f172a 0%, #020617 100%); box-shadow: 0 0 100px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

        /* Dark overlay for better text contrast */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 16, 0.75);
            /* Fallback for gradients */
            z-index: 1;
        }

        /* Glassmorphism Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Neon Accents */
        .neon-line {
            width: 120px;
            height: 4px;
            background-color: #00F3FF;
            margin: 24px auto;
            box-shadow: 0 0 15px #00F3FF;
            border-radius: 2px;
        }

        .corner-accent {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #BC13FE;
            z-index: 11;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        .top-left {
            top: -10px;
            left: -10px;
            border-right: none;
            border-bottom: none;
        }

        .bottom-right {
            bottom: -10px;
            right: -10px;
            border-left: none;
            border-top: none;
        }

        /* Typography */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 80px;
            font-weight: 900;
            color: #FFFFFF;
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        h2 {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 500;
            color: #E0E0E0;
            margin-top: 16px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 18px;
            color: #00F3FF;
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Tech Elements */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            animation: scan 6s linear infinite;
            z-index: 5;
            opacity: 0.5;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .tech-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, 0.2);
            z-index: 2;
        }

        .c1 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-style: dashed;
            animation: rotate 40s linear infinite;
        }

        .c2 {
            width: 800px;
            height: 800px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(188, 19, 254, 0.1);
            animation: rotate-rev 60s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes rotate-rev {
            from {
                transform: translate(-50%, -50%) rotate(360deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(0deg);
            }
        }

        .presenter-info {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            color: #FFF;
            font-weight: 600;
        }

        /* Floating particles effect (simulated with dots) */
        .particle {
            position: absolute;
            background-color: #00F3FF;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        .p1 {
            width: 4px;
            height: 4px;
            top: 20%;
            left: 20%;
            animation-duration: 8s;
        }

        .p2 {
            width: 6px;
            height: 6px;
            top: 70%;
            left: 80%;
            animation-duration: 12s;
            background-color: #BC13FE;
        }

        .p3 {
            width: 3px;
            height: 3px;
            top: 40%;
            left: 90%;
            animation-duration: 15s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    
        p { margin: 0; color: white; }</style>
</head>



<body>
    <div class="slide-container">
        <div style="position: relative; width: 100%; height: 100%;">
            <!-- Background Overlay -->
        <div class="overlay"></div>
        <!-- Animated Tech Elements -->
        <div class="scan-line"></div>
        <div class="tech-circle c1"></div>
        <div class="tech-circle c2"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <!-- Main Content Card -->
        <div class="glass-card">
            <!-- Decorative Corners -->
            <div class="corner-accent top-left"></div>
            <div class="corner-accent bottom-right"></div>
            <!-- Title Content -->
            <p style="margin: 0;">
            <h1 class="glow-text">SMART MOBILITY</h1>
            </p>
            <p style="margin: 0;">
            <h1 class="glow-text" style="color: transparent; -webkit-text-stroke: 2px #FFF; opacity: 0.8;">PROTOTYPE
            </h1>
            </p>
            <div class="neon-line"></div>
            <p style="margin: 0;">
            <h2>AI-Driven Traffic Intelligence</h2>
            </p>
            <div class="tagline">
                <i class="fas fa-microchip"></i>
                <p style="margin: 0;">INTEGRATED • REAL-TIME • ADAPTIVE</p>
                <i class="fas fa-network-wired"></i>
            </div>
            <div class="presenter-info">
                <div class="info-item">
                    <p class="info-label">SYSTEM</p>
                    <p class="info-value">v2.0.4 BETA</p>
                </div>
                <div class="info-item">
                    <p class="info-label">STATUS</p>
                    <p class="info-value" style="color: #00FF9D;">ONLINE</p>
                </div>
                <div class="info-item">
                    <p class="info-label">DATE</p>
                    <p class="info-value">2026-03-25</p>
                </div>
            </div>
        </div>

    
        </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('keydown', function(event) {
            const currentPath = window.location.pathname;
            const currentFile = currentPath.substring(currentPath.lastIndexOf('/') + 1) || '1.html';
            const currentNum = parseInt(currentFile.split('.')[0]) || 1;
            let nextNum;
            if (event.code === 'ArrowRight' || event.code === 'Space') {
                nextNum = currentNum + 1;
                if (nextNum <= 19) window.location.href = nextNum + '.html';
            } else if (event.code === 'ArrowLeft') {
                nextNum = currentNum - 1;
                if (nextNum >= 1) window.location.href = nextNum + '.html';
            }
        });
    </script>

</body>



</html>
